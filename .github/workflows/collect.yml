name: zigbang_collect
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4        # v3 → v4 로 업그레이드

      - name: Python 설치
        uses: actions/setup-python@v5    # v4 → v5 로 업그레이드
        with:
          python-version: '3.10'

      - name: 라이브러리 설치
        run: pip install requests

      - name: 스크립트 실행
        run: python 0317_songpa.py

      - name: 결과 저장
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/*.csv data/*.txt
          git diff --staged --quiet || git commit -m "daily zigbang data"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
